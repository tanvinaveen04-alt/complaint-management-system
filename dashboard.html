<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ComplaintMS</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <nav class="navbar">

        <h2>ComplaintMS</h2>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="add-complaint.html">New Complaint</a></li>
            <li><a href="my-complaints.html">My Complaints</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>

    </nav>

</header>

<section class="dashboard">

    <h1 id="welcomeMessage">Welcome!</h1>

    <p class="dashboard-subtitle">
        Manage and track your complaints quickly and easily.
    </p>

    <div class="stats">

        <div class="card">
            <i class="fa-solid fa-file-circle-exclamation fa-3x"></i>
            <h2 id="totalComplaints">0</h2>
            <p>Total Complaints</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-clock fa-3x"></i>
            <h2 id="pendingComplaints">0</h2>
            <p>Pending</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-circle-check fa-3x"></i>
            <h2 id="resolvedComplaints">0</h2>
            <p>Resolved</p>
        </div>

    </div>

    <div class="dashboard-buttons">

        <a href="add-complaint.html" class="btn">
            <i class="fa-solid fa-plus"></i>
            Register Complaint
        </a>

        <a href="my-complaints.html" class="btn">
            <i class="fa-solid fa-list"></i>
            My Complaints
        </a>

        <button onclick="logout()" class="btn logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>

    </div>

</section>

<script src="js/main.js"></script>

</body>

</html>
