<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login - ComplaintMS</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header>

    <nav class="navbar">

        <h2>ComplaintMS</h2>

        <ul>

            <li>
                <a href="index.html">Home</a>
            </li>

            <li>
                <a href="login.html">User Login</a>
            </li>

        </ul>

    </nav>

</header>

<section class="login">

    <h1>Admin Login</h1>

    <form id="adminLoginForm">

        <input
            type="email"
            id="adminEmail"
            placeholder="Admin Email"
            required
        >

        <input
            type="password"
            id="adminPassword"
            placeholder="Admin Password"
            required
        >

        <button type="submit">
            Login as Admin
        </button>

    </form>

</section>

<script src="js/main.js"></script>

</body>

</html>
